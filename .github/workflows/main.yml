name: CI
on:
  push:
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 6 1,15 * *"

jobs:
  unit_tests:
    if: false
    name: Run unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        #koha-version: [main, stable, oldstable]
        koha-version: [main, stable]

    steps:
    - name: Checkout plugin code
      uses: actions/checkout@v4

    - name: Get Koha Version Branch Name
      id: koha-version
      uses: "bywatersolutions/github-action-koha-get-version-by-label@v2"
      with:
        version-label: "${{ matrix.koha-version }}"

    - name: Set up environment variables
      run: |
        IFS='/' read -r -a parts <<< "$GITHUB_REPOSITORY"
        GITHUB_REPO="${parts[1]}"
        echo "GITHUB_REPO=$GITHUB_REPO" >> $GITHUB_ENV
        echo "KOHA_BRANCH=${{ steps.koha-version.outputs.current-branch-name }}" >> $GITHUB_ENV
        echo "PLUGINS_DIR=$(pwd)/.." >> $GITHUB_ENV
        echo "SYNC_REPO=$(pwd)/../kohaclone" >> $GITHUB_ENV

    - name: Check out Koha
      run: |
        cd ..
        git clone --branch ${{ env.KOHA_BRANCH }} --single-branch --depth 1 https://github.com/Koha-Community/Koha.git kohaclone

    - name: Install koha-testing-docker
      run: |
        cd ..
        git clone https://gitlab.com/koha-community/koha-testing-docker.git
        cd koha-testing-docker
        cp env/defaults.env .env
        echo "$(pwd)/bin" >> $GITHUB_PATH

    - name: Launch KTD instance with plugins support
      run: |
        cd ../koha-testing-docker
        export LOCAL_USER_ID=$(id -u)
        export KTD_HOME=$(pwd)
        # Use version-major-minor but handle main branch case
        if [ "${{ matrix.koha-version }}" = "main" ]; then
          export KOHA_IMAGE=main
        else
          export KOHA_IMAGE=${{ steps.koha-version.outputs.version-major-minor }}
        fi
        ktd --name edifact --plugins up -d

    - name: Wait for KTD to be ready
      run: |
        cd ../koha-testing-docker
        export KTD_HOME=$(pwd)
        ktd --name edifact --wait-ready 500

    - name: Install extra CPAN modules the plugin needs
      run: |
        export KTD_HOME=$(pwd)/../koha-testing-docker
        ktd --name edifact --shell --run "sudo cpanm Business::Barcode::EAN13"

    - name: Run plugin tests
      run: |
        export KTD_HOME=$(pwd)/../koha-testing-docker
        ktd --name edifact --shell --run "
          cd /kohadevbox/plugins/${{ env.GITHUB_REPO }} &&
          export PERL5LIB=\$PERL5LIB:. &&
          prove -v -r -s t/
        "

    - name: Show logs on failure
      if: failure()
      run: |
        export KTD_HOME=$(pwd)/../koha-testing-docker
        echo "=== KTD instance status ==="
        ktd --name edifact --list || true
        echo "=== Koha error logs ==="
        ktd --name edifact --shell --run "tail -50 /var/log/koha/kohadev/plack-intranet-error.log" || true
        echo "=== Container logs ==="
        docker logs edifact-koha-1 --tail 50 || true

    - name: Cleanup KTD instance
      if: always()
      run: |
        export KTD_HOME=$(pwd)/../koha-testing-docker
        ktd --name edifact down || true

  rebase:
    name: Rebase other branches
    if: ${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}
    runs-on: ubuntu-latest
    #needs: unit_tests
    strategy:
      fail-fast: false
    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false
        fetch-depth: 0

    - name: Run rebase_branches.pl
      if: ${{ github.repository == 'bywatersolutions/koha-plugin-edifact-enhanced' }}
      run: TAG=${GITHUB_REF##*/} ./rebase_branches.pl
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}

  release:
    name: Build & Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    #needs: [rebase, unit_tests]
    needs: rebase
    strategy:
      fail-fast: false
    steps:

    - uses: actions/checkout@v4
      with:
        ref: main

    - name: Parse out and store the GitHub repository name
      id: myvars
      run: |
        IFS='/' read -r -a parts <<< "$GITHUB_REPOSITORY"
        GITHUB_REPO="${parts[1]}"
        echo "github_repo=$GITHUB_REPO" >> $GITHUB_OUTPUT
        echo "GITHUB REPO: $GITHUB_REPO"

        TAG_VERSION="${GITHUB_REF##*/}"
        echo "TAG VERSION: $TAG_VERSION"
        TAG_VERSION="${TAG_VERSION:1}"
        echo "TAG VERSION 2: $TAG_VERSION"
        echo "tag_version=$TAG_VERSION" >> $GITHUB_OUTPUT

    - name: Get Koha Version Branch Name
      id: koha-version-oldstable
      uses: "bywatersolutions/github-action-koha-get-version-by-label@v2"
      with:
        version-label: "oldstable"

    - name: Print minimum version
      run: |
        echo "Current oldstable version: ${{ steps.koha-version-oldstable.outputs.version-major-minor }}"
    - name: Dump myvars outputs
      env:
        GITHUB_CONTEXT: ${{ toJson(steps.myvars.outputs) }}
      run: echo "$GITHUB_CONTEXT"

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Extract version from tag
      id: version
      run: |
        # Extract version from tag (remove 'v' prefix if present)
        VERSION=${GITHUB_REF#refs/tags/}
        VERSION=${VERSION#v}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Extracted version: $VERSION"

    - name: Install dependencies
      run: npm ci

    - name: Update package.json version
      run: |
        # Update package.json version to match the release tag
        npm version ${{ steps.version.outputs.version }} --no-git-tag-version

    - name: Update plugin file version
      run: |
        # Run the preversion script logic manually to update plugin file
        sed -i -e "s/^our \$VERSION = .*/our \$VERSION = \"${{ steps.version.outputs.version }}\";/" Koha/Plugin/Com/ByWaterSolutions/EdifactBrodart.pm
        rm -f Koha/Plugin/Com/ByWaterSolutions/EdifactBrodart.pm-e

    - name: Commit version updates
      if: false
      run: |
        git add package.json package-lock.json Koha/Plugin/Com/ByWaterSolutions/EdifactBrodart.pm
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Sync version ${{ steps.version.outputs.version }} from GitHub release"
          git push origin main
        fi

    - name: Build plugin
      run: npm run build

    - name: Upload kpz to release
      uses: softprops/action-gh-release@v2
      with:
        files: ./koha-plugin-edifact-brodart-v${{ steps.version.outputs.version }}.kpz
        tag_name: ${{ github.ref_name }}

  keepalive:
    name: Keep Alive
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Check age and push commit if needed
      run: |
        LAST_COMMIT=$( git --no-pager log -1 --format=%ct )
        NOW=$(date +%s)
        DIFF=$(($NOW-$LAST_COMMIT))
        DAYS=$(($DIFF/86400))
        git config --global user.email kyle@bywatersolutions.com
        git config --global user.name "Kyle M Hall"
        git commit --allow-empty -m "Automated commit from keep alive workflow"
        if [ "$DAYS" -gt "50" ]; then git push; fi
